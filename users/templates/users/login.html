{% extends 'products/base.html' %}

{% block title %}Вход - ShopMod{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">🔐 Вход в ShopMod</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">
                            {{ field.label }}
                        </label>
                        {{ field }}
                    </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        🔑 Войти
                    </button>
                </form>
                
                <div class="mt-3 text-center">
                    <p>Нет аккаунта? 
                        <a href="{% url 'register' %}" class="text-decoration-none">Зарегистрируйтесь</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
